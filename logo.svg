<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&amp;display=swap');
    </style>
  </defs>

  <g transform="translate(60, 60)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="54" fill="none" stroke="#8BC34A" stroke-width="5.5"/>

    <!-- Inner circle -->
    <circle cx="0" cy="0" r="40" fill="none" stroke="#8BC34A" stroke-width="3.5"/>

    <!-- Power button - vertical line -->
    <line x1="0" y1="-36" x2="0" y2="-12" stroke="#8BC34A" stroke-width="5.5" stroke-linecap="round"/>

    <!-- Power button - arc (open at top) -->
    <path d="M -16 -28 A 28 28 0 1 0 16 -28" fill="none" stroke="#8BC34A" stroke-width="5" stroke-linecap="round"/>

    <!-- Circuit trace 1 - sweeping curve from upper right to lower left -->
    <path d="M 12 -4 Q 18 10 8 22 Q -2 32 -16 30" fill="none" stroke="#8BC34A" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Circuit trace 2 - parallel curve -->
    <path d="M 18 4 Q 22 18 10 30 Q 0 38 -10 38" fill="none" stroke="#8BC34A" stroke-width="3" stroke-linecap="round"/>

    <!-- Circuit trace 3 - outermost curve -->
    <path d="M 22 12 Q 26 26 14 36 Q 6 42 -4 44" fill="none" stroke="#8BC34A" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Solder dots at trace endpoints -->
    <circle cx="12" cy="-4" r="2.8" fill="#8BC34A"/>
    <circle cx="-16" cy="30" r="2.8" fill="#8BC34A"/>
    <circle cx="18" cy="4" r="2.5" fill="#8BC34A"/>
    <circle cx="-10" cy="38" r="2.5" fill="#8BC34A"/>
    <circle cx="22" cy="12" r="2.2" fill="#8BC34A"/>
    <circle cx="-4" cy="44" r="2.2" fill="#8BC34A"/>
  </g>

  <!-- ATIVAR text -->
  <text x="130" y="52" font-family="'Poppins', sans-serif" font-weight="800" font-size="50" fill="#8BC34A" letter-spacing="1">ATIVAR</text>

  <!-- ELETRÔNICA text -->
  <text x="132" y="84" font-family="'Poppins', sans-serif" font-weight="700" font-size="32" fill="#444444" letter-spacing="3">ELETRÔNICA</text>

  <!-- CONSERTOU, ATIVOU! tagline -->
  <text x="132" y="108" font-family="'Poppins', sans-serif" font-weight="600" font-size="15" fill="#777777" letter-spacing="3">CONSERTOU, ATIVOU!</text>
</svg>